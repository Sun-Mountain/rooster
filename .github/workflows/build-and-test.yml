name: Rooster Push Tests
run-name: Run unit tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-version: [10.x]
    steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - run: echo "The ${{ github.repository }} repository on branch ${{ github.ref }} has been checked out."
        - name: Use Node.js ${{ matrix.pnpm-version }}
          uses: pnpm/action-setup@v5
          with:
            version: ${{ matrix.pnpm-version }}
            # cache: 'pnpm'
        - run: pnpm install
        # - name: Run tests
        #   run: pnpm run test
        - name: Tests finished
          run: echo "Tests have finished running."
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-version: [10.x]
    steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - run: echo "The ${{ github.repository }} repository on branch ${{ github.ref }} has been checked out."
        - name: Use Node.js ${{ matrix.pnpm-version }}
          uses: pnpm/action-setup@v5
          with:
            version: ${{ matrix.pnpm-version }}
            # cache: 'pnpm'
        - run: pnpm install
        - run: pnpm run lint
  playwright:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-version: [10.x]
    steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - run: echo "The ${{ github.repository }} repository on branch ${{ github.ref }} has been checked out."
        - name: Use Node.js ${{ matrix.pnpm-version }}
          uses: pnpm/action-setup@v5
          with:
            version: ${{ matrix.pnpm-version }}
            # cache: 'pnpm'
        - name: Install dependencies
          run: pnpm install
        - name: Install Playwright
          run: pnpm playwright install --with-deps
        - name: Run Playwright tests
          run: pnpm playwright test
        - name: Upload Playwright report
          uses: actions/upload-artifact@v4
          if: ${{ !cancelled() }}
          with:
            name: playwright-report
            path: playwright-report/
            retention-days: 30
